name: Build and Deploy to Microk8s

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Forza il nome del repo in minuscolo
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build . -t ghcr.io/${REPO_LOWER}:latest --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}"
          docker push ghcr.io/${REPO_LOWER}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Microk8s via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_SSH_IP }}
          username: admin
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Forza il nome in minuscolo anche qui per il deploy
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            cat <<EOF > ~/broken-bank-deploy.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: broken-bank
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: broken-bank
              template:
                metadata:
                  labels:
                    app: broken-bank
                spec:
                  containers:
                  - name: broken-bank
                    image: ghcr.io/${REPO_LOWER}:latest
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 7777
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: broken-bank-service
            spec:
              type: NodePort
              selector:
                app: broken-bank
              ports:
                - port: 7777
                  targetPort: 7777
                  nodePort: 30007
            EOF

            /snap/bin/microk8s kubectl apply -f ~/broken-bank-deploy.yaml
            /snap/bin/microk8s kubectl rollout restart deployment/broken-bank
