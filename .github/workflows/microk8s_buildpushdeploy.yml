name: Build and Deploy to Microk8s

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Qui aggiungiamo le label per la Traceability!
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            com.paloaltonetworks.app=broken-bank

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Microk8s via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_SSH_IP }}
          username: admin
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Creiamo il file di deployment al volo sulla VM
            cat <<EOF > ~/broken-bank-deploy.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: broken-bank
              labels:
                app: broken-bank
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: broken-bank
              template:
                metadata:
                  labels:
                    app: broken-bank
                spec:
                  containers:
                  - name: broken-bank
                    image: ghcr.io/${{ github.repository }}:latest
                    ports:
                    - containerPort: 7777
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: broken-bank-service
            spec:
              type: NodePort
              selector:
                app: broken-bank
              ports:
                - port: 7777
                  targetPort: 7777
                  nodePort: 30007
            EOF
            
            # Applichiamo il deploy su microk8s
            microk8s kubectl apply -f ~/broken-bank-deploy.yaml
