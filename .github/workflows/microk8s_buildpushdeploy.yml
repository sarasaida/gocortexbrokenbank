name: Build and Deploy to Microk8s

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Trasformiamo il nome in minuscolo (GHCR è pignolo su questo)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            com.paloaltonetworks.app=broken-bank

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Microk8s via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_SSH_IP }}
          username: admin
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # 1. Configurazione PATH
            export PATH=$PATH:/snap/bin

            # 2. Creazione Secret per scaricare l'immagine da GHCR (se non esiste)
            # Questo serve perché il registro di GitHub è privato
            /snap/bin/microk8s kubectl create secret docker-registry ghcr-login \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | /snap/bin/microk8s kubectl apply -f -

            # 3. Creazione del file di deployment
            cat <<EOF > ~/broken-bank-deploy.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: broken-bank
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: broken-bank
              template:
                metadata:
                  labels:
                    app: broken-bank
                spec:
                  containers:
                  - name: broken-bank
                    image: ghcr.io/${{ github.repository }}:latest
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 7777
                  imagePullSecrets:
                  - name: ghcr-login
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: broken-bank-service
            spec:
              type: NodePort
              selector:
                app: broken-bank
              ports:
                - port: 7777
                  targetPort: 7777
                  nodePort: 30007
            EOF

            # 4. Applicazione del deploy e rollout restart per forzare l'aggiornamento
            /snap/bin/microk8s kubectl apply -f ~/broken-bank-deploy.yaml
            /snap/bin/microk8s kubectl rollout restart deployment/broken-bank
