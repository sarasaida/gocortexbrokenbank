name: Build and Deploy to EKS

on:
  push:
    tags:
      - 'v*' # Si attiva solo quando pushi un tag che inizia con 'v' (es. v1.0, v1.1)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Recupero del Tag (es. v1.0.2)
      - name: Get tag version
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 2. AWS Authentication
      # NOTA: Se il token è scaduto, assicurati che i segreti AWS_ACCESS_KEY_ID 
      # e AWS_SECRET_ACCESS_KEY siano aggiornati su GitHub.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_SS }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build & Push con il Tag specifico
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: gocortexbrokenbank
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./react-app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. Update Kubernetes Deployment
      # Invece di usare 'latest', forziamo l'immagine con il tag appena creato
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name clusit-cluster --region eu-central-1

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: gocortexbrokenbank
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          # Aggiorna l'immagine nel deployment senza modificare il file YAML a mano
          kubectl set image deployment/gocortexbrokenbank gocortexbrokenbank=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n gocortexbrokenbank
          kubectl rollout status deployment/gocortexbrokenbank -n gocortexbrokenbank
