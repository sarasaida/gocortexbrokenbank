name: Build, Push and Deploy BrokenBank

on:
  push:
    branches: [ main ]      
  workflow_dispatch:       

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: eu-north-1          
  EKS_CLUSTER_NAME: clusit-lab-2

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # - name: Log in to the Container registry
      #   uses: docker/login-action@v2
      #   with:
      #     registry: ${{ env.REGISTRY }}
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Build and push image
      #   run: |
      #     docker build . -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      #     docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_SS }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_SS }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_SS }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
      
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Namespace
          metadata:
            name: gocortexbrokenbank
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: gocortexbrokenbank
            namespace: gocortexbrokenbank
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: gocortexbrokenbank
            template:
              metadata:
                labels:
                  app: gocortexbrokenbank
              spec:
                containers:
                - name: gocortexbrokenbank
                  image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 8888
                  - containerPort: 8080
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: gocortexbrokenbank
            namespace: gocortexbrokenbank
            labels:
              app: gocortexbrokenbank
          spec:
            type: LoadBalancer
            selector:
              app: gocortexbrokenbank
            ports:
              - name: flask
                port: 8888
                targetPort: 8888
                protocol: TCP
              - name: tomcat
                port: 9999
                targetPort: 8080
                protocol: TCP
              - name: react
                port: 7777
                targetPort: 7777
                protocol: TCP
          EOF
