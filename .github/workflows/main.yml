name: Manual Image Load and Deploy

on:
  workflow_dispatch: # La lanci tu a mano quando sei pronta

env:
  REGISTRY: ghcr.io
  # L'immagine "buona" di partenza
  SOURCE_IMAGE: ghcr.io/paloaltonetworks/broken-bank:latest
  # La tua immagine di destinazione
  TARGET_IMAGE: ghcr.io/${{ github.repository }}:latest
  AWS_REGION: eu-central-1
  EKS_CLUSTER_NAME: clusit-lab

jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # STEP CHIAVE: Carichiamo l'immagine a mano nel tuo registro
      - name: Pull, Tag and Push Image
        run: |
          echo "Scarico l'immagine originale..."
          docker pull ${{ env.SOURCE_IMAGE }}
          
          echo "La rinomino per il tuo account..."
          docker tag ${{ env.SOURCE_IMAGE }} ${{ env.TARGET_IMAGE }}
          
          echo "La carico sul tuo GitHub Container Registry..."
          docker push ${{ env.TARGET_IMAGE }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: broken-bank
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: broken-bank
            template:
              metadata:
                labels:
                  app: broken-bank
              spec:
                containers:
                - name: broken-bank
                  image: ${{ env.TARGET_IMAGE }}
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 8080
                  - containerPort: 8888
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: broken-bank-service
          spec:
            type: LoadBalancer
            selector:
              app: broken-bank
            ports:
              - name: tomcat
                protocol: TCP
                port: 80
                targetPort: 8080
              - name: flask
                protocol: TCP
                port: 8888
                targetPort: 8888
          EOF
